<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TOEIC Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #080b10;
  --surface:  #0e1318;
  --card:     #131920;
  --border:   #1e2a35;
  --border2:  #26384a;
  --text:     #dde6ef;
  --muted:    #5a7085;
  --accent:   #38bdf8;
  --accent2:  #0ea5e9;
  --green:    #34d399;
  --red:      #f87171;
  --amber:    #fbbf24;
  --r:        14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── NAV ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;backdrop-filter:blur(12px)}
.logo{font-family:'Instrument Serif',serif;font-size:22px;color:var(--accent);letter-spacing:-0.5px}
.logo span{color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:300;margin-left:8px;opacity:.5}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px}
.tab{padding:7px 20px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:none;transition:.2s}
.tab.active{background:var(--card);color:var(--text);border:1px solid var(--border2)}
.stats-badge{font-size:12px;color:var(--muted);display:flex;gap:16px}
.stat{display:flex;flex-direction:column;align-items:flex-end}
.stat-n{font-size:18px;font-weight:600;color:var(--text);line-height:1}
.stat-l{font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:.8px}

/* ── PAGES ── */
.page{display:none;padding:40px 32px;max-width:820px;margin:0 auto;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── FLASHCARD ── */
.card-area{display:flex;flex-direction:column;align-items:center;gap:28px}
.progress-row{width:100%;display:flex;align-items:center;gap:12px}
.prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:.4s}
.prog-text{font-size:12px;color:var(--muted);min-width:60px;text-align:right}

/* flip card */
.flip-wrap{width:100%;max-width:560px;height:300px;perspective:1200px;cursor:pointer}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:20px;border:1px solid var(--border2);backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:36px;background:var(--card)}
.face.back{transform:rotateY(180deg);background:linear-gradient(135deg,#0e1c2a,#0b1520)}
.face-hint{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:500}
.face-word{font-family:'Instrument Serif',serif;font-size:42px;color:var(--text);text-align:center;line-height:1.1}
.face-type{font-size:12px;color:var(--accent);background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);padding:3px 12px;border-radius:20px}
.face-phonetic{font-size:15px;color:var(--muted);font-style:italic}
.face-mean{font-family:'Instrument Serif',serif;font-size:28px;color:var(--green);text-align:center}
.face-example{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;font-style:italic;max-width:380px}
.face-example em{color:var(--accent);font-style:normal}

.card-hint{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.card-hint svg{width:14px;height:14px;opacity:.5}

.action-row{display:flex;gap:12px;width:100%;max-width:560px}
.btn{border:none;border-radius:10px;padding:12px 0;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;flex:1;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-unknown{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red)}
.btn-unknown:hover{background:rgba(248,113,113,.18)}
.btn-known{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--green)}
.btn-known:hover{background:rgba(52,211,153,.18)}
.btn-skip{background:var(--surface);border:1px solid var(--border);color:var(--muted)}
.btn-skip:hover{background:var(--card)}

.nav-row{display:flex;gap:10px;align-items:center}
.nav-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;font-size:16px}
.nav-btn:hover{border-color:var(--border2);color:var(--text)}
.mode-badge{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);color:var(--muted);background:var(--surface)}
.mode-badge.review{border-color:rgba(251,191,36,.3);color:var(--amber);background:rgba(251,191,36,.07)}

/* ── ADD WORD ── */
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:500}
.field input,.field select,.field textarea{background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--text);font-family:inherit;resize:none;outline:none;transition:.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,.08)}
.field select option{background:var(--card)}
.add-btn{grid-column:1/-1;padding:13px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--accent2),var(--accent));color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;letter-spacing:.2px}
.add-btn:hover{filter:brightness(1.1)}

.word-list{margin-top:24px;display:flex;flex-direction:column;gap:8px}
.word-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:16px;transition:.2s}
.word-item:hover{border-color:var(--border2)}
.wi-word{font-family:'Instrument Serif',serif;font-size:17px;color:var(--text);min-width:140px}
.wi-type{font-size:11px;color:var(--accent);background:rgba(56,189,248,.1);padding:2px 9px;border-radius:20px}
.wi-mean{font-size:13px;color:var(--muted);flex:1}
.wi-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wi-status.known{background:var(--green)}
.wi-status.unknown{background:var(--red)}
.wi-status.new{background:var(--border2)}
.wi-del{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s}
.wi-del:hover{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.08)}

/* ── HISTORY ── */
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.hist-title{font-family:'Instrument Serif',serif;font-size:24px}
.clear-btn{font-size:12px;color:var(--muted);border:1px solid var(--border);background:none;border-radius:8px;padding:6px 14px;cursor:pointer;transition:.2s}
.clear-btn:hover{color:var(--red);border-color:rgba(248,113,113,.3)}
.hist-day{margin-bottom:24px}
.hist-day-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:10px}
.hist-day-label::after{content:'';flex:1;height:1px;background:var(--border)}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;transition:.2s}
.hist-card:hover{border-color:var(--border2)}
.hc-word{font-family:'Instrument Serif',serif;font-size:16px;color:var(--text)}
.hc-mean{font-size:12px;color:var(--muted);margin-top:3px}
.hc-time{font-size:10px;color:var(--border2);margin-top:6px}
.hc-status{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-top:6px}
.hc-status.known{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.hc-status.unknown{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.3}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 22px;font-size:13px;color:var(--text);opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SUMMARY ── */
.summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;display:flex;gap:20px;margin-bottom:28px}
.sum-item{flex:1;text-align:center}
.sum-n{font-size:28px;font-weight:600;line-height:1}
.sum-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:4px}
.sum-item.known .sum-n{color:var(--green)}
.sum-item.unknown .sum-n{color:var(--red)}
.sum-item.total .sum-n{color:var(--accent)}

.section-title{font-family:'Instrument Serif',serif;font-size:20px;margin-bottom:16px;color:var(--text)}
</style>
</head>
<body>

<nav>
  <div class="logo">TOEIC<span>Flashcard</span></div>
  <div class="tabs">
    <button class="tab active" onclick="goPage('study')">Học</button>
    <button class="tab" onclick="goPage('manage')">Từ vựng</button>
    <button class="tab" onclick="goPage('history')">Lịch sử</button>
  </div>
  <div class="stats-badge">
    <div class="stat"><span class="stat-n" id="nav-total">0</span><span class="stat-l">Tổng từ</span></div>
    <div class="stat"><span class="stat-n" id="nav-known" style="color:var(--green)">0</span><span class="stat-l">Đã thuộc</span></div>
  </div>
</nav>

<!-- ── STUDY PAGE ── -->
<div class="page active" id="page-study">
  <div class="card-area">
    <div class="progress-row">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="prog-text" id="prog-text">0 / 0</span>
      <span class="mode-badge" id="mode-badge">Tất cả từ</span>
    </div>

    <div class="flip-wrap" id="flip-wrap" onclick="flipCard()">
      <div class="flip-inner">
        <div class="face front">
          <span class="face-hint">nhấn để lật</span>
          <div class="face-word" id="card-word">—</div>
          <div class="face-type" id="card-type"></div>
          <div class="face-phonetic" id="card-phonetic"></div>
        </div>
        <div class="face back">
          <span class="face-hint">nghĩa tiếng việt</span>
          <div class="face-mean" id="card-mean">—</div>
          <div class="face-example" id="card-example"></div>
        </div>
      </div>
    </div>

    <div class="card-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 15l6 6m-11-4a7 7 0 110-14 7 7 0 010 14z"/></svg>
      Nhấn vào thẻ để xem nghĩa
    </div>

    <div class="action-row">
      <button class="btn btn-unknown" onclick="markWord(false)">✗ &nbsp;Chưa thuộc</button>
      <button class="btn btn-skip" onclick="nextCard()">→ Bỏ qua</button>
      <button class="btn btn-known" onclick="markWord(true)">✓ &nbsp;Đã thuộc</button>
    </div>

    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()">←</button>
      <button class="nav-btn" onclick="shuffleCards()">⇌</button>
      <button class="btn btn-skip" style="flex:none;padding:0 18px;height:40px;font-size:12px" onclick="toggleReviewMode()">Ôn từ chưa thuộc</button>
      <button class="nav-btn" onclick="nextCard()">→</button>
    </div>
  </div>
</div>

<!-- ── MANAGE PAGE ── -->
<div class="page" id="page-manage">
  <div class="add-form">
    <div class="field"><label>Từ tiếng anh *</label><input id="f-word" placeholder="e.g. negotiate"/></div>
    <div class="field"><label>Phiên âm</label><input id="f-phon" placeholder="e.g. /nɪˈɡoʊʃieɪt/"/></div>
    <div class="field"><label>Loại từ</label>
      <select id="f-type">
        <option value="v.">Động từ (v.)</option>
        <option value="n.">Danh từ (n.)</option>
        <option value="adj.">Tính từ (adj.)</option>
        <option value="adv.">Trạng từ (adv.)</option>
        <option value="phrase">Cụm từ</option>
      </select>
    </div>
    <div class="field"><label>Nghĩa tiếng việt *</label><input id="f-mean" placeholder="e.g. đàm phán, thương lượng"/></div>
    <div class="field full"><label>Câu ví dụ (dùng ** để in đậm từ)</label><textarea id="f-ex" rows="2" placeholder="e.g. We need to **negotiate** the contract terms carefully."></textarea></div>
    <button class="add-btn" onclick="addWord()">+ Thêm từ vựng</button>
  </div>

  <div class="word-list" id="word-list"></div>
</div>

<!-- ── HISTORY PAGE ── -->
<div class="page" id="page-history">
  <div class="hist-header">
    <h2 class="hist-title">Lịch sử học</h2>
    <button class="clear-btn" onclick="clearHistory()">Xóa lịch sử</button>
  </div>

  <div class="summary">
    <div class="sum-item total"><div class="sum-n" id="h-total">0</div><div class="sum-l">Lần học</div></div>
    <div class="sum-item known"><div class="sum-n" id="h-known">0</div><div class="sum-l">Đã thuộc</div></div>
    <div class="sum-item unknown"><div class="sum-n" id="h-unknown">0</div><div class="sum-l">Chưa thuộc</div></div>
  </div>

  <div id="hist-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────
const DEFAULT_WORDS = [
  {word:"negotiate",phon:"/nɪˈɡoʊʃieɪt/",type:"v.",mean:"đàm phán, thương lượng",ex:"We need to **negotiate** the contract terms carefully."},
  {word:"dedicate",phon:"/ˈdedɪkeɪt/",type:"v.",mean:"cống hiến, dành riêng",ex:"She **dedicates** her time to improving customer service."},
  {word:"collaborate",phon:"/kəˈlæbəreɪt/",type:"v.",mean:"hợp tác",ex:"The two teams **collaborate** on the annual report."},
  {word:"revenue",phon:"/ˈrevənjuː/",type:"n.",mean:"doanh thu",ex:"The company's **revenue** increased by 20% this quarter."},
  {word:"invoice",phon:"/ˈɪnvɔɪs/",type:"n.",mean:"hóa đơn",ex:"Please send the **invoice** to the accounting department."},
  {word:"merger",phon:"/ˈmɜːrdʒər/",type:"n.",mean:"vụ sáp nhập",ex:"The **merger** between the two banks was finalized yesterday."},
  {word:"efficient",phon:"/ɪˈfɪʃnt/",type:"adj.",mean:"hiệu quả, năng suất",ex:"An **efficient** workflow saves time and resources."},
  {word:"subsequent",phon:"/ˈsʌbsɪkwənt/",type:"adj.",mean:"tiếp theo, sau đó",ex:"**Subsequent** meetings will be held every Monday."},
  {word:"promptly",phon:"/ˈprɒmptli/",type:"adv.",mean:"ngay lập tức, nhanh chóng",ex:"Please respond to emails **promptly**."},
  {word:"comply",phon:"/kəmˈplaɪ/",type:"v.",mean:"tuân thủ, chấp hành",ex:"All employees must **comply** with company policies."},
  {word:"facilitate",phon:"/fəˈsɪlɪteɪt/",type:"v.",mean:"tạo điều kiện, hỗ trợ",ex:"Technology can **facilitate** remote work effectively."},
  {word:"mandatory",phon:"/ˈmændətɔːri/",type:"adj.",mean:"bắt buộc",ex:"Attendance at the safety training is **mandatory**."},
  {word:"reimburse",phon:"/ˌriːɪmˈbɜːrs/",type:"v.",mean:"hoàn tiền, bồi hoàn",ex:"The company will **reimburse** your travel expenses."},
  {word:"vendor",phon:"/ˈvendər/",type:"n.",mean:"nhà cung cấp",ex:"We are reviewing proposals from multiple **vendors**."},
  {word:"perspective",phon:"/pərˈspektɪv/",type:"n.",mean:"quan điểm, góc nhìn",ex:"From a business **perspective**, this deal is very beneficial."},
];

let words = JSON.parse(localStorage.getItem('toeic_words') || 'null') || DEFAULT_WORDS.map(w=>({...w,status:'new',id:Date.now()+Math.random()}));
let history = JSON.parse(localStorage.getItem('toeic_history') || '[]');
let deck = [], idx = 0, reviewMode = false;

function save(){localStorage.setItem('toeic_words',JSON.stringify(words));localStorage.setItem('toeic_history',JSON.stringify(history))}

// ── PAGES ─────────────────────────────────────
function goPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  const tabs = {study:0,manage:1,history:2};
  document.querySelectorAll('.tab')[tabs[p]].classList.add('active');
  if(p==='study') buildDeck();
  if(p==='manage') renderWordList();
  if(p==='history') renderHistory();
  updateNav();
}

// ── STUDY ─────────────────────────────────────
function buildDeck(){
  deck = reviewMode ? words.filter(w=>w.status==='unknown') : [...words];
  if(deck.length===0){deck=[...words];reviewMode=false}
  idx=0; showCard();
}

function shuffleCards(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]]}
  idx=0; showCard(); toast('Đã xáo bài ⇌')
}

function showCard(){
  const flip=document.getElementById('flip-wrap');
  flip.classList.remove('flipped');
  if(deck.length===0){
    document.getElementById('card-word').textContent='Không có từ nào';
    document.getElementById('card-mean').textContent='—';
    document.getElementById('card-type').textContent='';
    document.getElementById('card-phonetic').textContent='';
    document.getElementById('card-example').innerHTML='';
    updateProgress(); return;
  }
  const w=deck[idx];
  document.getElementById('card-word').textContent=w.word;
  document.getElementById('card-type').textContent=w.type||'';
  document.getElementById('card-phonetic').textContent=w.phon||'';
  document.getElementById('card-mean').textContent=w.mean;
  document.getElementById('card-example').innerHTML=(w.ex||'').replace(/\*\*(.+?)\*\*/g,'<em>$1</em>');
  updateProgress();
}

function flipCard(){document.getElementById('flip-wrap').classList.toggle('flipped')}

function nextCard(){
  if(deck.length===0)return;
  idx=(idx+1)%deck.length; showCard();
}
function prevCard(){
  if(deck.length===0)return;
  idx=(idx-1+deck.length)%deck.length; showCard();
}

function markWord(known){
  if(deck.length===0)return;
  const w=deck[idx];
  const orig=words.find(x=>x.id===w.id);
  if(orig) orig.status=known?'known':'unknown';
  history.unshift({word:w.word,mean:w.mean,status:known?'known':'unknown',time:Date.now()});
  save(); updateNav();
  toast(known?'✓ Đã thuộc!':'✗ Chưa thuộc');
  // remove from deck if known in review mode
  if(reviewMode&&known) deck.splice(idx,1);
  if(deck.length===0){toast('Hoàn thành bộ từ! 🎉');buildDeck();return}
  if(reviewMode) idx=idx%deck.length;
  else idx=(idx+1)%deck.length;
  showCard();
}

function toggleReviewMode(){
  reviewMode=!reviewMode;
  document.getElementById('mode-badge').textContent=reviewMode?'Ôn từ chưa thuộc':'Tất cả từ';
  document.getElementById('mode-badge').className='mode-badge'+(reviewMode?' review':'');
  buildDeck();
  toast(reviewMode?'Chế độ: Ôn từ chưa thuộc':'Chế độ: Tất cả từ');
}

function updateProgress(){
  const total=deck.length,cur=total?idx+1:0;
  document.getElementById('prog-fill').style.width=total?(cur/total*100)+'%':'0%';
  document.getElementById('prog-text').textContent=`${cur} / ${total}`;
}

// ── ADD WORD ──────────────────────────────────
function addWord(){
  const word=document.getElementById('f-word').value.trim();
  const mean=document.getElementById('f-mean').value.trim();
  if(!word||!mean){toast('Vui lòng điền từ và nghĩa!');return}
  words.push({
    id:Date.now()+Math.random(),
    word,phon:document.getElementById('f-phon').value.trim(),
    type:document.getElementById('f-type').value,
    mean,ex:document.getElementById('f-ex').value.trim(),
    status:'new'
  });
  save(); renderWordList(); updateNav();
  ['f-word','f-phon','f-ex'].forEach(id=>document.getElementById(id).value='');
  toast('Đã thêm từ "'+word+'"');
}

function deleteWord(id){
  words=words.filter(w=>w.id!==id);
  save(); renderWordList(); updateNav(); toast('Đã xóa từ');
}

function renderWordList(){
  const el=document.getElementById('word-list');
  if(words.length===0){el.innerHTML='<div class="empty"><div class="empty-icon">📚</div>Chưa có từ vựng nào. Hãy thêm từ ở trên!</div>';return}
  el.innerHTML=words.map(w=>`
    <div class="word-item">
      <div class="wi-status ${w.status||'new'}"></div>
      <div class="wi-word">${w.word}</div>
      <div class="wi-type">${w.type||''}</div>
      <div class="wi-mean">${w.mean}</div>
      <button class="wi-del" onclick="deleteWord(${w.id})">✕</button>
    </div>`).join('');
}

// ── HISTORY ───────────────────────────────────
function renderHistory(){
  const known=history.filter(h=>h.status==='known').length;
  const unknown=history.filter(h=>h.status==='unknown').length;
  document.getElementById('h-total').textContent=history.length;
  document.getElementById('h-known').textContent=known;
  document.getElementById('h-unknown').textContent=unknown;

  if(history.length===0){
    document.getElementById('hist-body').innerHTML='<div class="empty"><div class="empty-icon">📖</div>Chưa có lịch sử học. Hãy bắt đầu học!</div>';
    return;
  }

  // Group by date
  const groups={};
  history.forEach(h=>{
    const d=new Date(h.time);
    const key=d.toLocaleDateString('vi-VN',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
    if(!groups[key])groups[key]=[];
    groups[key].push(h);
  });

  document.getElementById('hist-body').innerHTML=Object.entries(groups).map(([date,items])=>`
    <div class="hist-day">
      <div class="hist-day-label">${date}</div>
      <div class="hist-grid">
        ${items.map(h=>`
          <div class="hist-card">
            <div class="hc-word">${h.word}</div>
            <div class="hc-mean">${h.mean}</div>
            <div class="hc-time">${new Date(h.time).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}</div>
            <div class="hc-status ${h.status}">${h.status==='known'?'Đã thuộc':'Chưa thuộc'}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function clearHistory(){
  if(!confirm('Xóa toàn bộ lịch sử học?'))return;
  history=[];save();renderHistory();toast('Đã xóa lịch sử');
}

// ── NAV STATS ─────────────────────────────────
function updateNav(){
  document.getElementById('nav-total').textContent=words.length;
  document.getElementById('nav-known').textContent=words.filter(w=>w.status==='known').length;
}

// ── TOAST ─────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.classList.remove('show'),2000);
}

// ── KEYBOARD ──────────────────────────────────
document.addEventListener('keydown',e=>{
  const p=document.querySelector('.page.active').id;
  if(p!=='page-study')return;
  if(e.key===' '||e.key==='Enter'){e.preventDefault();flipCard()}
  if(e.key==='ArrowRight')nextCard();
  if(e.key==='ArrowLeft')prevCard();
  if(e.key==='1')markWord(false);
  if(e.key==='2')markWord(true);
});

// ── INIT ──────────────────────────────────────
buildDeck(); updateNav();
</script>
</body>
</html>
